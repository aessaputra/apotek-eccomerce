name: Test CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['dev', 'staging', 'main', 'release/**']

jobs:
  test:
    name: Test on Push / Pull-Request
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      # checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # setup node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: package-lock.json
          node-version: ${{ matrix.node-version }}
          cache: npm

      # install dependencies
      - name: Install dependencies
        run: npm ci

      # fail if code is not formatted (enforce format without modifying repo)
      - name: Format check
        run: npm run format:check

      # run lint test
      - name: Lint Test
        run: npm run lint

      # run unit test
      - name: Unit Test
        run: npm run test
